# wrangler.toml — wedding-image-proxy Cloudflare Worker config
name = "wedding-image-proxy"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]
keep_vars = true


[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1

# R2 Bucket Binding (Direct Access)
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "studio-public-gallery"

[[r2_buckets]]
binding = "SYSTEM_BUCKET"
bucket_name = "studio-site-assets"

# Secrets are NOT stored here.
# Set them via CLI before deploying:
#   wrangler secret put SUPABASE_SERVICE_ROLE_KEY
#
# For local dev, create a .dev.vars file (DO NOT COMMIT):
#   SUPABASE_URL=https://your-project.supabase.co
#   SUPABASE_SERVICE_ROLE_KEY=your_service_role_key_here

[vars]
SUPABASE_URL = "https://ebdqpcankdxjoasvksbx.supabase.co"
B2_ENDPOINT = "https://s3.eu-central-003.backblazeb2.com"
B2_APPLICATION_KEY_ID = "0032e9d6782d1920000000002"
B2_REELS_BUCKET = "studio-public-reels"
B2_FILMS_BUCKET = "studio-public-films"
B2_PRIVATE_BUCKET = "studio-private-deliverables"
IMAGEKIT_ID = "sqzrx4ir2d"
