# wrangler.toml — image-proxy Cloudflare Worker config
name = "wedding-image-proxy"
main = "src/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# Secrets are NOT stored here.
# Set them via CLI before deploying:
#   wrangler secret put BUCKET_ACCESS_TOKEN
#   wrangler secret put LICENSE_API_BASE
#
# For local dev, create a .dev.vars file (DO NOT COMMIT):
#   BUCKET_ACCESS_TOKEN=your_token_here
#   LICENSE_API_BASE=https://api.zorvik.com/api/v1/verify
