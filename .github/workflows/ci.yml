name: CI — wedding-image-proxy

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # JOB 1: Lint — ESLint 9 Flat Config, Zero Warning Policy
  # ─────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ESLint 9)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint (zero warnings policy)
        run: npm run lint

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 2: Test — Vitest unit tests
  # ─────────────────────────────────────────────────────────────────────────
  test:
    name: Test (Vitest)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 3: Build verification — Wrangler dry-run (no actual deploy)
  # ─────────────────────────────────────────────────────────────────────────
  build:
    name: Build (Wrangler dry-run)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Wrangler dry-run (validate bundle)
        run: npm run build
        # CLOUDFLARE_API_TOKEN not required for dry-run
        # For live deploy from CI, add secret: CLOUDFLARE_API_TOKEN in repo Settings → Secrets

  # ─────────────────────────────────────────────────────────────────────────
  # JOB 4: Deploy — Automatic production deployment on push to master
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy
